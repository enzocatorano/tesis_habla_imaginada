name: preproc_v0_test_rf_mlp
description: "Ejercicio de prueba (ficticio) para probar la organización de experimentos. NO es un experimento real, solo sirve de ejemplo."
data_root: "../../data/processed"                  # ruta relativa desde esta carpeta de experimento al raw .mat
processed_root: "./data"                           # acá se guardarán los .npz generados por este experimento
features_root: "./features"                        # donde guardaremos X.npy, y.npy
fs: 1024

preprocess:
  # parámetros de preprocesado
  bandpass: [1, 50]   # [Hz] pasa-banda
  notch: 50           # [Hz] frecuencia de línea a eliminar (notch)
  channels: 6
  channel_names: ["F3","F4","C3","C4","P3","P4"]

features:
  # parámetros de extracción de features
  window_s: 1.0       # ventana en segundos
  overlap: 0.5        # solapamiento (50%)
  bands:
    delta: [1,4]
    theta: [4,8]
    alpha: [8,13]
    beta:  [13,30]

model:
  type: RandomForest
  n_estimators: 200
  random_state: 42

train:
  test_size: 0.2
  stratify: true
